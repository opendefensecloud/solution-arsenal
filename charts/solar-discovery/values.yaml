# solar-discovery Helm chart values

# -- Image configuration for solar-discovery
image:
  repository: ghcr.io/opendefensecloud/solar-discovery
  # -- Overrides the image tag (default is the chart appVersion)
  tag: ""
  pullPolicy: IfNotPresent

# -- Image pull secrets (list of secret names)
imagePullSecrets: []

# -- Override the full name of resources
fullnameOverride: ""

# -- Override the chart name
nameOverride: ""

# -- Kubernetes namespace where discovered Component and ComponentVersion
# resources will be created.
namespace: ""

# -- Registry resources to create alongside the discovery deployment.
# Each entry becomes a Registry CR that this discovery worker watches.
# Prefer this for demo, single-tenant, or quick-start scenarios where
# you want `helm install` to leave you with a working discovery
# pipeline in one step.
#
# For multi-tenant setups where the same registry is shared across
# namespaces via RegistryBinding + ReferenceGrant, leave this empty
# and apply Registry CRs separately — their lifecycle should not be
# coupled to any single discovery deployment.
#
# Note: chart-owned Registries are deleted on `helm uninstall`.
# `solarSecretRef` references a Secret that must already exist in the
# release namespace; the chart does not create it.
registries: []
# Example (webhook mode):
#   - name: zot-source           # optional; default: sanitised hostname
#     hostname: zot.example.com:5000
#     flavor: zot                # required if webhookPath is set
#     webhookPath: events
#     plainHTTP: false
#     solarSecretRef: zot-source-auth
#     targetPullSecretName: regcred
# Example (scan mode):
#   - hostname: ghcr.io/opendefensecloud
#     scanInterval: 5m
#     targetPullSecretName: ghcr-pull-secret

# -- Webhook listener configuration
service:
  # -- Create a Service for the webhook listener
  enabled: true
  # -- Service type
  type: ClusterIP
  # -- Webhook listener port
  port: 8080

# -- Additional environment variables (name/value pairs)
env: []

# -- Number of replicas
replicaCount: 1

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Override the ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

rbac:
  # -- Create ClusterRole and ClusterRoleBinding for discovery RBAC
  create: true

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- CA certificate bundle configuration.
# Mount a ConfigMap containing a CA bundle for TLS connections to registries.
caBundle:
  # -- Enable CA bundle mounting
  enabled: false
  # -- Name of the ConfigMap containing the CA bundle
  configMapName: ""
  # -- Key in the ConfigMap (default: trust-bundle.pem)
  key: "trust-bundle.pem"
