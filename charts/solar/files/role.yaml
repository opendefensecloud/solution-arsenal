---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - solar.opendefense.cloud
  resources:
  - componentversions
  - profiles
  - referencegrants
  - registries
  - registrybindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - solar.opendefense.cloud
  resources:
  - profiles/status
  - releases/status
  - renderartifacts/status
  - rendertasks/status
  - targets/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - solar.opendefense.cloud
  resources:
  - releasebindings
  - releases
  - renderartifacts
  - renderbindings
  - rendertasks
  - targets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - solar.opendefense.cloud
  resources:
  - renderartifacts/finalizers
  - rendertasks/finalizers
  - targets/finalizers
  verbs:
  - update
