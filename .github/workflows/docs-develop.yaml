name: Docs Develop
on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - mkdocs.yml
      - .github/workflows/docs-develop.yaml
      - Makefile

permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          # Credentials are intentionally persisted: `mike deploy --push` below
          # uses the checkout token to push the built docs to the gh-pages branch.
          persist-credentials: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.14.5
      - name: Install Dependencies
        run: |
          pip install -r docs/requirements.txt
      - name: Setup Docs Deploy
        run: |
          git config --global user.name "Docs Deploy"
          git config --global user.email "docs.deploy@opendefense.cloud"
      - name: Build Docs Website
        run: |
          mike deploy --push develop
