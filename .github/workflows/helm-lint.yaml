name: Helm Lint
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "charts/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "charts/**"

jobs:
  lint:
    runs-on: ubuntu-24.04
    # helm comes from the flake via dev-kit.
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      # cachix-action: empty authToken on fork PRs → read-only fallback.
      - name: Use opendefensecloud Cachix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: opendefensecloud
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # GHA-backed per-repo nix store; same-job-restart fallback for Cachix misses.
      - name: Use magic-nix-cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Lint Helm charts
        run: |
          for chart in charts/*/; do
            if [ -f "${chart}Chart.yaml" ]; then
              echo "Linting chart: ${chart}"
              helm lint "${chart}"
            fi
          done

      - name: Template Helm charts
        run: |
          for chart in charts/*/; do
            if [ -f "${chart}Chart.yaml" ]; then
              echo "Templating chart: ${chart}"
              helm template test "${chart}"
            fi
          done
