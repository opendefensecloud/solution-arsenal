name: Golang CI
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "**/*.go"
      - ".github/workflows/golang.yaml"
      - "flake.nix"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "tools.lock"
  pull_request:
    branches: [main, develop]
    paths:
      - "**/*.go"
      - ".github/workflows/golang.yaml"
      - "flake.nix"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "tools.lock"

env:
  GO_MODULE: https://github.com/opendefensecloud/solution-arsenal

jobs:
  lint:
    runs-on: ubuntu-24.04
    outputs:
      go-version: ${{ steps.get-go-version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: get-go-version
        id: get-go-version
        run: |
          GO_VERSION="$(sed -nE 's/^[[:space:]]*goVersion[[:space:]]*=[[:space:]]*"([0-9]+\.[0-9]+\.[0-9]+)";[[:space:]]*$/\1/p' flake.nix)"
          if [ "$(printf '%s\n' "$GO_VERSION" | sed '/^$/d' | wc -l)" -ne 1 ]; then
            echo "::error::Expected exactly one goVersion assignment in flake.nix"
            exit 1
          fi
          echo "version=$GO_VERSION" >> $GITHUB_OUTPUT
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ steps.get-go-version.outputs.version }}
      - name: lint-license-and-shell
        run: |
          # shellcheck is pre-installed on ubuntu-24.04, this is mostly for local execution
          if ! command -v shellcheck &> /dev/null; then
            echo "shellcheck is missing. Installing..."
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi
          make lint-no-golangci
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9

  test:
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ needs.lint.outputs.go-version }}
      - name: test
        run: |
          make test
      - name: Convert coverage to lcov
        uses: jandelgado/gcov2lcov-action@e4612787670fc5b5f49026b8c29c5569921de1db # v1.2.0
        with:
          infile: solar.coverprofile
      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.github_token }}
          path-to-lcov: coverage.lcov
  
  buildAndPush:
    uses: ./.github/workflows/docker.yaml
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    with:
      ok-to-e2e: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ok-to-e2e') }}

  test-e2e:
    needs: [lint, buildAndPush]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Report skipped E2E tests
        if: needs.buildAndPush.outputs.image-tag == ''
        run: |
          echo "## :warning: E2E Tests Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No Docker images were built. To run E2E tests on a PR, add the \`ok-to-e2e\` label." >> $GITHUB_STEP_SUMMARY
          echo "E2E tests skipped: no images built. Add the 'ok-to-e2e' label to the PR to enable."
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: needs.buildAndPush.outputs.image-tag != ''
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        if: needs.buildAndPush.outputs.image-tag != ''
        with:
          go-version: ${{ needs.lint.outputs.go-version }}
      - name: Create Kubernetes (Kind) Cluster
        if: needs.buildAndPush.outputs.image-tag != ''
        uses: helm/kind-action@0025e74a8c7512023d06dc019c617aa3cf561fde # v1.10.0
        with:
          install_only: true 
      - name: Install Tools
        if: needs.buildAndPush.outputs.image-tag != ''
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl
          kubectl version --client

          # Install helm
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - name: Run E2E Test Suite
        if: needs.buildAndPush.outputs.image-tag != ''
        env:
          REGISTRY: ${{ env.ACT && 'localhost:5001/local' || format('ghcr.io/{0}', github.repository_owner) }}
          IMAGE_TAG: ${{ needs.buildAndPush.outputs.image-tag }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          make test-e2e TAG=$IMAGE_TAG REGISTRY=$REGISTRY
