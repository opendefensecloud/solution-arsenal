name: Golang CI
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "**/*.go"
      - ".github/workflows/golang.yaml"
      - "flake.nix"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "tools.lock"
  pull_request:
    branches: [main, develop]
    paths:
      - "**/*.go"
      - ".github/workflows/golang.yaml"
      - "flake.nix"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "tools.lock"

env:
  GO_MODULE: https://github.com/opendefensecloud/solution-arsenal

jobs:
  lint:
    runs-on: arc-scale-set
    outputs:
      go-version: ${{ steps.get-go-version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: get-go-version
        id: get-go-version
        run: |
          GO_VERSION="$(sed -nE 's/^[[:space:]]*goVersion[[:space:]]*=[[:space:]]*"([0-9]+\.[0-9]+\.[0-9]+)";[[:space:]]*$/\1/p' flake.nix)"
          if [ "$(printf '%s\n' "$GO_VERSION" | sed '/^$/d' | wc -l)" -ne 1 ]; then
            echo "::error::Expected exactly one goVersion assignment in flake.nix"
            exit 1
          fi
          echo "version=$GO_VERSION" >> $GITHUB_OUTPUT
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ steps.get-go-version.outputs.version }}
      - name: lint-license-and-shell
        run: |
          make lint-no-golangci
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9

  test:
    needs: lint
    runs-on: arc-scale-set
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ needs.lint.outputs.go-version }}
      - name: test
        run: |
          make test
      - name: Convert coverage to lcov
        uses: jandelgado/gcov2lcov-action@e4612787670fc5b5f49026b8c29c5569921de1db # v1.2.0
        with:
          infile: solar.coverprofile
      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.github_token }}
          path-to-lcov: coverage.lcov
