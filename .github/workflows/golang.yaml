name: Golang CI
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [labeled, unlabeled, opened, synchronize, reopened]

env:
  GO_MODULE: https://github.com/opendefensecloud/solution-arsenal

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            backend:
              - '**/*.go'
              - '.github/workflows/golang.yaml'
              - 'flake.nix'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'tools.lock'
  lint:
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    outputs:
      go-version: ${{ steps.go-version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: go-version
        uses: opendefensecloud/dev-kit/.github/actions/get-go-version@5107b50be074d483888a332c008d6bd27beb93e0 # v1.0.10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ steps.go-version.outputs.version }}
      - name: lint-license-and-shell
        run: |
          # shellcheck is pre-installed on ubuntu-24.04, this is mostly for local execution
          if ! command -v shellcheck &> /dev/null; then
            echo "shellcheck is missing. Installing..."
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi
          make lint-no-golangci
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9

  test:
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ needs.lint.outputs.go-version }}
      - name: test
        run: |
          make test
      - name: Convert coverage to lcov
        uses: jandelgado/gcov2lcov-action@e4612787670fc5b5f49026b8c29c5569921de1db # v1.2.0
        with:
          infile: solar.coverprofile
      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.github_token }}
          path-to-lcov: coverage.lcov
  
