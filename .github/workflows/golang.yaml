name: Golang CI
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [labeled, unlabeled, opened, synchronize, reopened]

env:
  GO_MODULE: https://github.com/opendefensecloud/solution-arsenal

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            backend:
              - '**/*.go'
              - '.github/workflows/golang.yaml'
              - 'flake.nix'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'tools.lock'
  lint:
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    # Tools (go, golangci-lint, shellcheck, addlicense) come from the
    # flake. `make lint` runs both lint-no-golangci and golangci-lint.
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Use opendefensecloud Cachix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: opendefensecloud
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Use magic-nix-cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - name: lint
        run: make lint

  test:
    needs: lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Use opendefensecloud Cachix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: opendefensecloud
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Use magic-nix-cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - name: test
        run: make test
      - name: Convert coverage to lcov
        uses: jandelgado/gcov2lcov-action@e4612787670fc5b5f49026b8c29c5569921de1db # v1.2.0
        with:
          infile: solar.coverprofile
      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.github_token }}
          path-to-lcov: coverage.lcov
  
