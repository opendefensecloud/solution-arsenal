name: Golang CI
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [labeled, unlabeled, opened, synchronize, reopened]

env:
  GO_MODULE: https://github.com/opendefensecloud/solution-arsenal

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            backend:
              - '**/*.go'
              - '.github/workflows/golang.yaml'
              - 'flake.nix'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'tools.lock'
  lint:
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    # Tools (go, golangci-lint, shellcheck, addlicense) come from the
    # flake. `make lint` runs both lint-no-golangci and golangci-lint.
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false
          diagnostic-endpoint: ''
      - name: Use opendefensecloud Cachix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: opendefensecloud
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ secrets.CACHIX_SIGNING_KEY }}
      # Nix provides the Go toolchain but not a warm GOMODCACHE / GOCACHE
      # between runs. Restore both from actions/cache; trust-scoped
      # (pr/trusted) per the pattern established in #237 to prevent PR
      # cache poisoning of trusted-ref builds.
      - name: Cache Go module + build caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-cache-lint-${{ github.event_name == 'pull_request' && 'pr' || 'trusted' }}-${{ hashFiles('go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-cache-lint-${{ github.event_name == 'pull_request' && 'pr' || 'trusted' }}-${{ hashFiles('go.sum') }}-
            go-cache-lint-${{ github.event_name == 'pull_request' && 'pr' || 'trusted' }}-
      - name: lint
        run: make lint

  test:
    needs: lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false
          diagnostic-endpoint: ''
      - name: Use opendefensecloud Cachix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: opendefensecloud
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ secrets.CACHIX_SIGNING_KEY }}
      # See lint job for rationale; separate cache scope per job so
      # lint (which only builds compile-side artefacts) doesn't clobber
      # test (which also builds envtest / ginkgo test binaries).
      - name: Cache Go module + build caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-cache-test-${{ github.event_name == 'pull_request' && 'pr' || 'trusted' }}-${{ hashFiles('go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-cache-test-${{ github.event_name == 'pull_request' && 'pr' || 'trusted' }}-${{ hashFiles('go.sum') }}-
            go-cache-test-${{ github.event_name == 'pull_request' && 'pr' || 'trusted' }}-
      - name: test
        run: make test
      - name: Convert coverage to lcov
        uses: jandelgado/gcov2lcov-action@e4612787670fc5b5f49026b8c29c5569921de1db # v1.2.0
        with:
          infile: solar.coverprofile
      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.github_token }}
          path-to-lcov: coverage.lcov
  
