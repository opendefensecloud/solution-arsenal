name: Build/Publish Docker Image

permissions:
  contents: read

on:
  release:
    types:
      - published
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
    types: [labeled, unlabeled, opened, synchronize, reopened]

jobs:
  buildAndPush:
    strategy:
      matrix:
        image:
          - name: solar-controller-manager
            target: manager
          - name: solar-apiserver
            target: apiserver
          - name: solar-renderer
            target: renderer
          - name: solar-discovery
            target: discovery
    permissions:
      contents: read
      packages: write
      id-token: write # for keyless signing
      attestations: write
    name: Build and Publish Docker Image
    # Condition: Run on push to main, published release, PR with 'ok-to-image' label, or any workflow_call (caller already decided)
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && (
        contains(toJSON(github.event.pull_request.labels), '"ok-to-image"') ||
        contains(toJSON(github.event.pull_request.labels), '"ok-to-e2e"')
      )) ||
      (github.event_name == 'release' && github.event.action == 'published')
    runs-on: ubuntu-24.04
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      is-local: ${{ env.ACT == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Setup Local Registry for act
        if: ${{ env.ACT == 'true' }}
        run: |
          if ! docker ps | grep -q act-registry; then
            docker run -d -p 5001:5000 --name act-registry registry:2
          fi
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        id: meta
        with:
          images: |
            ${{ env.ACT == 'true' && 'localhost:5001/local' || format('ghcr.io/{0}', github.repository_owner) }}/${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
          flavor: |
            latest=${{ github.ref == 'refs/heads/main' }}
      - name: Set up QEMU
        if: ${{ env.ACT != 'true' }}
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        id: buildx
        timeout-minutes: 5
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          version: latest
          driver-opts: ${{ env.ACT == 'true' && 'network=host' || '' }}
      - name: Login to GHCR
        if: ${{ env.ACT != 'true' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # buildkit-cache-dance restores/saves the RUN --mount=type=cache contents
      # (the Go build + module caches in our Dockerfile). docker/build-push-action's
      # cache-to=gha preserves layers but NOT cache-mount contents, so without
      # this dance every CI build starts with an empty Go build cache.
      # Per-binary scope; go.sum + sha in the key so a `go.sum` bump invalidates
      # cleanly but consecutive pushes can incrementally refresh the cache.
      - name: Cache Go build mounts
        if: ${{ env.ACT != 'true' }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: go-cache
        with:
          path: cache-mount
          # Scope key by trust level so PR builds and trusted (push to main /
          # release) builds live in disjoint cache namespaces. Prevents a
          # malicious PR from poisoning a cache that a later trusted build
          # would consume via the restore-keys ladder. Flagged by zizmor
          # (cache-poisoning) and CodeRabbit.
          key: cache-mount-${{ matrix.image.name }}-${{ github.event_name == 'pull_request' && 'pr' || 'trusted' }}-${{ hashFiles('go.sum') }}-${{ github.sha }}
          restore-keys: |
            cache-mount-${{ matrix.image.name }}-${{ github.event_name == 'pull_request' && 'pr' || 'trusted' }}-${{ hashFiles('go.sum') }}-
            cache-mount-${{ matrix.image.name }}-${{ github.event_name == 'pull_request' && 'pr' || 'trusted' }}-
      - name: Inject Go build cache into buildx
        if: ${{ env.ACT != 'true' }}
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: cache-mount
          dockerfile: Dockerfile
          # Always extract so post-build mount contents are saved for the next
          # run, even when we restored from a partial-key match.
          skip-extraction: false
      - name: Build and push
        id: image
        timeout-minutes: 20
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: ${{ env.ACT == 'true' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: ${{ matrix.image.target }}
          # Same trust-scoping rationale as the actions/cache step above: keep
          # PR-built layer caches out of the trusted (push/release) scope.
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ github.event_name == 'pull_request' && 'pr' || 'trusted' }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ github.event_name == 'pull_request' && 'pr' || 'trusted' }}
      - name: Install cosign
        if: ${{ env.ACT != 'true' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image with cosign
        if: ${{ env.ACT != 'true' }}
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.meta.outputs.tags }}"
          for tag in "${TAGS[@]}"; do
            cosign sign \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "sha=${{ github.sha }}" \
              --yes \
              "$tag"@${{ steps.image.outputs.digest }}
          done
      - name: Extract first tag
        id: first-tag
        run: |
          IFS=$'\n' read -ra TAGS <<< "${{ steps.meta.outputs.tags }}"
          echo "tag=${TAGS[0]}" >> $GITHUB_OUTPUT
      - name: Generate SBOM
        if: ${{ env.ACT != 'true' }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ steps.first-tag.outputs.tag }}
          format: 'cyclonedx-json'
          output-file: 'sbom.cyclonedx.json'
          upload-release-assets: false # we use immutable releases
      - name: Attest SBOM
        if: ${{ env.ACT != 'true' }}
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.image.outputs.digest }}
          sbom-path: 'sbom.cyclonedx.json'
          push-to-registry: true
      - name: Attest provenance
        if: ${{ env.ACT != 'true' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

  test-e2e:
    needs: buildAndPush
    if: needs.buildAndPush.result == 'success'
    uses: ./.github/workflows/test-e2e.yaml
    with:
      image-tag: ${{ needs.buildAndPush.outputs.image-tag }}
      is-local: ${{ fromJson(needs.buildAndPush.outputs.is-local) }}
    permissions:
      contents: read
      packages: read

