name: Build/Publish Docker Image

on:
  release:
    types:
      - published
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
    types: [labeled, unlabeled, opened, synchronize, reopened]
  workflow_call:
    outputs:
      image-tag:
        description: "The commit SHA used as image tag, empty if no images were built"
        value: ${{ jobs.buildAndPush.outputs.image-tag }}

jobs:
  buildAndPush:
    strategy:
      matrix:
        image:
          - name: solar-controller-manager
            target: manager
          - name: solar-apiserver
            target: apiserver
          - name: solar-renderer
            target: renderer
          - name: solar-discovery
            target: discovery
    permissions:
      contents: read
      packages: write
      id-token: write # for keyless signing
      attestations: write
    name: Build and Publish Docker Image
    # Condition: Run on push to main, published release, PR with 'ok-to-image' label, or any workflow_call (caller already decided)
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && (
        contains(toJSON(github.event.pull_request.labels), '"ok-to-image"') ||
        contains(toJSON(github.event.pull_request.labels), '"ok-to-e2e"')
      )) ||
      (github.event_name == 'release' && github.event.action == 'published')
    runs-on: ubuntu-24.04
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      is-local: ${{ env.ACT == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Local Registry for act
        if: ${{ env.ACT == 'true' }}
        run: |
          if ! docker ps | grep -q act-registry; then
            docker run -d -p 5001:5000 --name act-registry registry:2
          fi
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        id: meta
        with:
          images: |
            ${{ env.ACT == 'true' && 'localhost:5001/local' || format('ghcr.io/{0}', github.repository_owner) }}/${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
          flavor: |
            latest=${{ github.ref == 'refs/heads/main' }}
      - name: Set up QEMU
        if: ${{ env.ACT != 'true' }}
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        timeout-minutes: 5
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          version: latest
          driver-opts: ${{ env.ACT == 'true' && 'network=host' || '' }}
      - name: Login to GHCR
        if: ${{ env.ACT != 'true' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: image
        timeout-minutes: 20
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: ${{ env.ACT == 'true' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: ${{ matrix.image.target }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Install cosign
        if: ${{ env.ACT != 'true' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image with cosign
        if: ${{ env.ACT != 'true' }}
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.meta.outputs.tags }}"
          for tag in "${TAGS[@]}"; do
            cosign sign \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "sha=${{ github.sha }}" \
              --yes \
              "$tag"@${{ steps.image.outputs.digest }}
          done
      - name: Extract first tag
        id: first-tag
        run: |
          IFS=$'\n' read -ra TAGS <<< "${{ steps.meta.outputs.tags }}"
          echo "tag=${TAGS[0]}" >> $GITHUB_OUTPUT
      - name: Generate SBOM
        if: ${{ env.ACT != 'true' }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ steps.first-tag.outputs.tag }}
          format: 'cyclonedx-json'
          output-file: 'sbom.cyclonedx.json'
          upload-release-assets: false # we use immutable releases
      - name: Attest SBOM
        if: ${{ env.ACT != 'true' }}
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.image.outputs.digest }}
          sbom-path: 'sbom.cyclonedx.json'
          push-to-registry: true
      - name: Attest provenance
        if: ${{ env.ACT != 'true' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

  test-e2e:
    needs: buildAndPush
    if: needs.buildAndPush.result == 'success'
    uses: ./.github/workflows/test-e2e.yaml
    with:
      image-tag: ${{ needs.buildAndPush.outputs.image-tag }}
      is-local: ${{ needs.buildAndPush.outputs.is-local }}
    permissions:
      contents: read
      packages: read
