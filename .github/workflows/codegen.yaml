name: Codegen Check
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          # Use upstream Nix, not the Determinate fork (avoids the
          # determinate-nixd binary + FlakeHub auto-enablement we don't want).
          determinate: false
          # Don't post install telemetry to Determinate Systems.
          diagnostic-endpoint: ''
      - name: Use opendefensecloud Cachix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: opendefensecloud
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ secrets.CACHIX_SIGNING_KEY }}
      - name: Run codegen
        run: |
          make codegen
      - name: Check for changes
        uses: opendefensecloud/dev-kit/.github/actions/diff-check@41370fd52f6889401ef79388e54e7e38bfbf112e # v1.0.11
