name: Docs Release
on:
  release:
    types: [published]

permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          # Credentials are intentionally persisted: `mike deploy --push` below
          # uses the checkout token to push the built docs to the gh-pages branch.
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14.5
      - name: Install Dependencies
        run: |
          pip install -r docs/requirements.txt
      - name: Setup Docs Deploy
        run: |
          git config --global user.name "Docs Deploy"
          git config --global user.email "docs.deploy@opendefense.cloud"
      - name: Build Docs Website
        run: |
          mike deploy --push --update-aliases ${{ github.event.release.tag_name }} latest
