name: E2E Tests

on:
  workflow_call:
    inputs:
      image-tag:
        description: "Docker image tag to test"
        required: true
        type: string
      is-local:
        description: "running locally with act, which requires using localhost registry instead of GHCR"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

jobs:
  test-e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - id: go-version
        uses: opendefensecloud/dev-kit/.github/actions/get-go-version@41370fd52f6889401ef79388e54e7e38bfbf112e # v1.0.11
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ steps.go-version.outputs.version }}
      - name: Install Tools
        run: |
          # Install kind. The e2e suite creates the cluster itself via
          # `make e2e-cluster`, pinned to KIND_NODE_IMAGE (derived from
          # ENVTEST_K8S_VERSION) — the Makefile is the single source of truth
          # for the K8s version, so we only need the binary here.
          KIND_VERSION="v0.31.0"
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl
          kubectl version --client

          # Install helm
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version 

          # Install yq 
          YQ_VERSION="v4.46.1"
          curl -L "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o yq
          chmod +x ./yq
          sudo mv ./yq /usr/local/bin/yq
          yq --version

          # Install flux CLI 
          curl -s https://fluxcd.io/install.sh | sudo bash
          flux --version
      - name: Run E2E Test Suite
        env:
          E2E_IMAGE_SOURCE: ${{ inputs.is-local && 'local' || 'ghcr' }}
          REGISTRY: ${{ inputs.is-local && 'localhost:5001/local' || format('ghcr.io/{0}', github.repository_owner) }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          make test-e2e E2E_IMAGE_SOURCE=$E2E_IMAGE_SOURCE TAG=$IMAGE_TAG REGISTRY=$REGISTRY
