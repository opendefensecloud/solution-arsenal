name: E2E Tests

on:
  workflow_call:
    inputs:
      image-tag:
        description: "Docker image tag to test"
        required: true
        type: string
      is-local:
        description: "running locally with act, which requires using localhost registry instead of GHCR"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

jobs:
  test-e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: go-version
        uses: opendefensecloud/dev-kit/.github/actions/get-go-version@9fe77282c8260284d4efdb69d19b883e52e9a4d8 # v1.0.9
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ steps.go-version.outputs.version }}
      - name: Create Kubernetes (Kind) Cluster
        uses: helm/kind-action@0025e74a8c7512023d06dc019c617aa3cf561fde # v1.10.0
        with:
          cluster_name: solar-test-e2e
          node_image: kindest/node:v1.33.1
      - name: Install Tools
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl
          kubectl version --client

          # Install helm
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version 

          # Install yq 
          YQ_VERSION="v4.46.1"
          curl -L "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o yq
          chmod +x ./yq
          sudo mv ./yq /usr/local/bin/yq
          yq --version

          # Install flux CLI 
          curl -s https://fluxcd.io/install.sh | sudo bash
          flux --version
      - name: Run E2E Test Suite
        env:
          E2E_IMAGE_SOURCE: ${{ inputs.is-local && 'local' || 'ghcr' }}
          REGISTRY: ${{ inputs.is-local && 'localhost:5001/local' || format('ghcr.io/{0}', github.repository_owner) }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          make test-e2e E2E_IMAGE_SOURCE=$E2E_IMAGE_SOURCE TAG=$IMAGE_TAG REGISTRY=$REGISTRY
