name: E2E Tests

on:
  workflow_call:
    inputs:
      image-tag:
        description: "Docker image tag to test"
        required: true
        type: string
      is-local:
        description: "running locally with act, which requires using localhost registry instead of GHCR"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

jobs:
  test-e2e:
    runs-on: ubuntu-24.04
    # Tools (go, kind, kubectl, helm, yq, flux) come from the flake
    # via dev-kit.
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Use opendefensecloud Cachix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: opendefensecloud
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ secrets.CACHIX_SIGNING_KEY }}
      - name: Run E2E Test Suite
        env:
          E2E_IMAGE_SOURCE: ${{ inputs.is-local && 'local' || 'ghcr' }}
          REGISTRY: ${{ inputs.is-local && 'localhost:5001/local' || format('ghcr.io/{0}', github.repository_owner) }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          make test-e2e E2E_IMAGE_SOURCE=$E2E_IMAGE_SOURCE TAG=$IMAGE_TAG REGISTRY=$REGISTRY
