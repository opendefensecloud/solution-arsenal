name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release-please:
    runs-on: ubuntu-24.04
    permissions:
      # write permission is required to create the release and tag
      contents: write
      # write permission is required to label the release PR (labels go
      # through the Issues API)
      issues: write
      # write permission is required to maintain the release PR
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # PRs opened with the default GITHUB_TOKEN do not trigger CI
          # workflows on the release PR. Set the RELEASE_PLEASE_TOKEN secret
          # (fine-grained PAT or GitHub App token with contents + pull
          # requests write) to get required checks running on release PRs.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  release-assets:
    name: Build and attach release assets
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    permissions:
      # write permission is required to upload assets to the draft release
      contents: write
      id-token: write # for keyless cosign sign-blob
      attestations: write # for build-provenance attestation
    env:
      VERSION: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Immutable releases forbid uploading assets to an already-published
          # release, so release-please creates a draft release (with its tag
          # already pushed via force-tag-creation). Check out the release
          # commit by SHA to avoid racing on tag propagation. Publishing the
          # draft (explicit human decision) makes the release immutable and
          # triggers the docker/helm/docs release workflows.
          ref: ${{ needs.release-please.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Extract go version from flake.nix
        id: get-go-version
        run: |
          GO_VERSION="$(sed -nE 's/^[[:space:]]*goVersion[[:space:]]*=[[:space:]]*"([0-9]+\.[0-9]+\.[0-9]+)";[[:space:]]*$/\1/p' flake.nix)"
          if [ "$(printf '%s\n' "$GO_VERSION" | sed '/^$/d' | wc -l)" -ne 1 ]; then
            echo "::error::Expected exactly one goVersion assignment in flake.nix"
            exit 1
          fi
          echo "version=$GO_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ steps.get-go-version.outputs.version }}
          cache: true

      - name: Run tests
        run: make test

      - name: Build binaries
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildTime=${BUILD_TIME}"

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/solar-apiserver-linux-amd64 ./cmd/solar-apiserver
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/solar-controller-manager-linux-amd64 ./cmd/solar-controller-manager
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/solar-discovery-linux-amd64 ./cmd/solar-discovery
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/solar-renderer-linux-amd64 ./cmd/solar-renderer

          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/solar-apiserver-linux-arm64 ./cmd/solar-apiserver
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/solar-controller-manager-linux-arm64 ./cmd/solar-controller-manager
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/solar-discovery-linux-arm64 ./cmd/solar-discovery
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/solar-renderer-linux-arm64 ./cmd/solar-renderer

          # Darwin amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/solar-apiserver-darwin-amd64 ./cmd/solar-apiserver
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/solar-controller-manager-darwin-amd64 ./cmd/solar-controller-manager
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/solar-discovery-darwin-amd64 ./cmd/solar-discovery
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/solar-renderer-darwin-amd64 ./cmd/solar-renderer

          # Darwin arm64
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/solar-apiserver-darwin-arm64 ./cmd/solar-apiserver
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/solar-controller-manager-darwin-arm64 ./cmd/solar-controller-manager
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/solar-discovery-darwin-arm64 ./cmd/solar-discovery
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/solar-renderer-darwin-arm64 ./cmd/solar-renderer

      - name: Create checksums
        run: |
          find bin -type f ! -name checksums.txt | sort | xargs sha256sum > bin/checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: 'bin/solar-*-*' # binaries only; runs before signing so .sig/.pem are not yet present

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artefacts (keyless)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cd bin
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sigstore.json) continue ;; esac
            # Emit a Sigstore bundle (signature + cert + Rekor proof), named
            # *.sigstore.json so OpenSSF Scorecard's Signed-Releases check
            # detects it. Don't revert to --output-signature/--output-certificate:
            # those are deprecated and silently ignored by newer cosign, which
            # defaults to the bundle format and requires --bundle.
            cosign sign-blob --yes \
              --new-bundle-format=true \
              --bundle "${f}.sigstore.json" \
              "$f"
          done

      - name: Upload assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --clobber keeps re-runs idempotent when assets were already
          # partially uploaded
          gh release upload "${VERSION}" bin/* --repo "${GITHUB_REPOSITORY}" --clobber
