fullnameOverride: solar

commonLabels:
  trust: enabled

apiserver:
  image:
    repository: localhost/local/solar-apiserver

controller:
  image:
    repository: localhost/local/solar-controller-manager

renderer:
  image:
    repository: localhost/local/solar-renderer
  caConfigMap: root-bundle

discovery:
  image:
    repository: localhost/local/solar-discovery-worker

ui:
  admin:
    subjects:
      - kind: User
        name: admin@solar.local
        apiGroup: rbac.authorization.k8s.io
  impersonation:
    targets:
      - username: maintainer@solar.local
        groups:
          - maintainer
      - username: coordinator@solar.local
        groups:
          - coordinator
