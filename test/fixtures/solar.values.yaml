fullnameOverride: solar

commonLabels:
  trust: enabled

apiserver:
  image:
    repository: localhost/local/solar-apiserver

controller:
  image:
    repository: localhost/local/solar-controller-manager

renderer:
  image:
    repository: localhost/local/solar-renderer
  baseURL: zot-deploy.zot.svc.cluster.local
  pushSecretName: zot-deploy-auth
  caConfigMap: root-bundle

discovery:
  image:
    repository: localhost/local/solar-discovery-worker
