# E2E test values for solar-discovery (scan mode)
image:
  repository: localhost/local/solar-discovery
  tag: e2e
  pullPolicy: IfNotPresent

# namespace is overridden per-install via --set
namespace: default

service:
  enabled: false

caBundle:
  enabled: true
  configMapName: root-bundle
  key: trust-bundle.pem

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi
