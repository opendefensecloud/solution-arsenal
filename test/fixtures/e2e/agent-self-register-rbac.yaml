apiVersion: v1
kind: ServiceAccount
metadata:
  name: solar-agent-bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: solar-agent-bootstrap
rules:
  - apiGroups: ["solar.opendefense.cloud"]
    resources: ["targets"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: solar-agent-bootstrap
subjects:
  - kind: ServiceAccount
    name: solar-agent-bootstrap
roleRef:
  kind: Role
  name: solar-agent-bootstrap
  apiGroup: rbac.authorization.k8s.io
