apiVersion: v1
kind: ServiceAccount
metadata:
  name: solar-agent-remote-installer
---
# ClusterRole because creating a Namespace (part of what the installer does) is
# cluster-scoped. In this demo the "remote" cluster is the same kind-solar-dev
# cluster solar-apiserver runs in (self-referential); against a real target
# cluster this ServiceAccount would live there instead, scoped no more broadly
# than solar-agent's own install actually needs.
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: solar-agent-remote-installer
rules:
  - apiGroups: [""]
    resources: ["namespaces", "configmaps"]
    verbs: ["get", "create"]
# ClusterRoleBinding is created imperatively by setup-agent-remote-install.sh instead of
# here, since its subject namespace can't be set by `kubectl apply -n` the way a
# namespace-scoped resource's can.
