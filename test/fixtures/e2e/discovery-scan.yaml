apiVersion: v1
kind: Secret
metadata:
  name: zot-discovery-auth
type: Opaque
stringData:
  username: admin
  password: admin
---
apiVersion: solar.opendefense.cloud/v1alpha1
kind: Discovery
metadata:
  name: zot
spec:
  registry:
    registryURL: zot-discovery.zot.svc.cluster.local:443
    secretRef:
      name: zot-discovery-auth
    caConfigMapRef:
      name: root-bundle
  discoveryInterval: 24h
