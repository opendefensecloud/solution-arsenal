apiVersion: v1
kind: ServiceAccount
metadata:
  name: solar-ui
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: solar-ui
rules:
  # Allow reading all SolAr resources
  - apiGroups: ["solar.opendefense.cloud"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Impersonation fallback — only needed if --auth-mode=impersonate
  - apiGroups: [""]
    resources: ["users", "groups"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: solar-ui
subjects:
  - kind: ServiceAccount
    name: solar-ui
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: solar-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: solar-ui
  labels:
    app: solar-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: solar-ui
  template:
    metadata:
      labels:
        app: solar-ui
    spec:
      serviceAccountName: solar-ui
      containers:
        - name: solar-ui
          image: localhost/local/solar-ui:e2e
          args:
            - --listen=0.0.0.0:8090
            - --oidc-issuer=https://localhost:5556
            - --oidc-client-id=solar-ui
            - --oidc-client-secret=solar-ui-secret
            - --oidc-redirect-url=http://localhost:8090/api/auth/callback
            - --auth-mode=token
          ports:
            - containerPort: 8090
              name: http
          env:
            - name: SSL_CERT_DIR
              value: /etc/ssl/certs:/etc/dex-ca
          volumeMounts:
            - name: dex-ca
              mountPath: /etc/dex-ca
              readOnly: true
      volumes:
        - name: dex-ca
          secret:
            secretName: dex-ca
---
apiVersion: v1
kind: Service
metadata:
  name: solar-ui
spec:
  selector:
    app: solar-ui
  ports:
    - port: 8090
      targetPort: 8090
      name: http
