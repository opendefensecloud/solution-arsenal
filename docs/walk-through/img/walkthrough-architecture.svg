<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 540"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .box { fill: #fff; stroke: #666; stroke-width: 1.5; rx: 6; ry: 6; }
    .box-dash { fill: #fff; stroke: #666; stroke-width: 1.5; stroke-dasharray: 5 3; rx: 6; ry: 6; }
    .box-tall { fill: #fff; stroke: #666; stroke-width: 1.5; rx: 6; ry: 6; }
    .arrow { fill: none; stroke: #666; stroke-width: 1.4; marker-end: url(#ah); }
    .arrow-ref { fill: none; stroke: #999; stroke-width: 1.2; stroke-dasharray: 5 3; marker-end: url(#ah-light); }
    .sep { stroke: #e0e0e0; stroke-width: 0.8; stroke-dasharray: 4 4; }
    .region { fill: none; stroke: #bbb; stroke-width: 1; stroke-dasharray: 6 3; rx: 8; ry: 8; }
    .col-hdr { font-size: 11px; fill: #888; font-weight: 600; letter-spacing: 0.5px; }
    .box-title { font-size: 12px; fill: #333; font-weight: 500; }
    .box-sub { font-size: 10px; fill: #999; }
    .arrow-label { font-size: 9.5px; fill: #888; font-style: italic; }
    .step-num { font-size: 11px; fill: #fff; font-weight: 700; }
    .step-name { font-size: 9px; fill: #999; font-weight: 500; }
    .region-label { font-size: 10px; fill: #aaa; font-weight: 600; }
    .legend-text { font-size: 9.5px; fill: #999; }
  </style>
  <defs>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#666"/>
    </marker>
    <marker id="ah-light" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#999"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="157" y="18" text-anchor="middle" class="col-hdr">K8s Resource</text>
  <text x="367" y="18" text-anchor="middle" class="col-hdr">K8s Controller</text>
  <text x="607" y="18" text-anchor="middle" class="col-hdr">OCI Registry</text>
  <line x1="65" y1="30" x2="700" y2="30" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- ===== STEP 1: Discovery ===== -->

  <circle cx="30" cy="99" r="13" fill="#555"/>
  <text x="30" y="103" text-anchor="middle" class="step-num">1</text>
  <text x="30" y="124" text-anchor="middle" class="step-name">Discovery</text>

  <!-- Discovery CR (user-created) -->
  <rect x="80" y="78" width="155" height="42" class="box-dash"/>
  <text x="157" y="103" text-anchor="middle" class="box-title">Discovery</text>

  <!-- solar-discovery worker -->
  <rect x="290" y="78" width="155" height="42" class="box"/>
  <text x="367" y="103" text-anchor="middle" class="box-title">solar-discovery</text>

  <!-- Registry w/ Flavored Webhook -->
  <rect x="530" y="78" width="155" height="42" class="box"/>
  <text x="607" y="93" text-anchor="middle" class="box-title">Registry</text>
  <text x="607" y="107" text-anchor="middle" class="box-sub">w/ Flavored Webhook</text>

  <!-- Component / ComponentVersion -->
  <rect x="80" y="145" width="155" height="42" class="box"/>
  <text x="157" y="162" text-anchor="middle" class="box-title">Component /</text>
  <text x="157" y="176" text-anchor="middle" class="box-title">ComponentVersion</text>

  <!-- Step 1 arrows -->
  <path d="M 235,99 L 290,99" class="arrow"/>
  <path d="M 445,99 L 530,99" class="arrow"/>
  <text x="480" y="93" text-anchor="middle" class="arrow-label">scans</text>
  <path d="M 367,120 L 367,134 L 157,134 L 157,145" class="arrow"/>
  <text x="260" y="129" text-anchor="middle" class="arrow-label">creates</text>

  <!-- Separator -->
  <line x1="65" y1="202" x2="700" y2="202" class="sep"/>

  <!-- ===== STEP 2: Releases ===== -->

  <circle cx="30" cy="249" r="13" fill="#555"/>
  <text x="30" y="253" text-anchor="middle" class="step-num">2</text>
  <text x="30" y="274" text-anchor="middle" class="step-name">Releases</text>

  <!-- Release CR (user-created) -->
  <rect x="80" y="228" width="155" height="42" class="box-dash"/>
  <text x="157" y="253" text-anchor="middle" class="box-title">Release</text>

  <!-- RenderTask -->
  <rect x="290" y="228" width="155" height="42" class="box"/>
  <text x="367" y="253" text-anchor="middle" class="box-title">RenderTask</text>

  <!-- OutputRegistry (spans steps 2 and 3) -->
  <rect x="530" y="222" width="155" height="168" class="box-tall"/>
  <text x="607" y="300" text-anchor="middle" class="box-title">OutputRegistry</text>
  <text x="607" y="316" text-anchor="middle" class="box-sub">rendered charts</text>

  <!-- Step 2 arrows -->
  <path d="M 235,249 L 290,249" class="arrow"/>
  <path d="M 445,249 L 530,249" class="arrow"/>
  <text x="480" y="243" text-anchor="middle" class="arrow-label">pushes</text>

  <!-- Release refs ComponentVersion (dashed) -->
  <path d="M 157,228 L 157,187" class="arrow-ref"/>
  <text x="168" y="210" class="arrow-label">refs</text>

  <!-- Separator -->
  <line x1="65" y1="312" x2="525" y2="312" class="sep"/>

  <!-- ===== STEP 3: Bootstrap ===== -->

  <circle cx="30" cy="361" r="13" fill="#555"/>
  <text x="30" y="365" text-anchor="middle" class="step-num">3</text>
  <text x="30" y="386" text-anchor="middle" class="step-name">Bootstrap</text>

  <!-- Target CR (user-created) -->
  <rect x="80" y="340" width="155" height="42" class="box-dash"/>
  <text x="157" y="365" text-anchor="middle" class="box-title">Target</text>

  <!-- Bootstrap + RenderTask -->
  <rect x="290" y="340" width="155" height="42" class="box"/>
  <text x="367" y="357" text-anchor="middle" class="box-title">Bootstrap</text>
  <text x="367" y="371" text-anchor="middle" class="box-sub">+ RenderTask</text>

  <!-- Step 3 arrows -->
  <path d="M 235,361 L 290,361" class="arrow"/>
  <path d="M 445,361 L 530,361" class="arrow"/>
  <text x="480" y="355" text-anchor="middle" class="arrow-label">pushes</text>

  <!-- Target binds Release (dashed) -->
  <path d="M 157,340 L 157,270" class="arrow-ref"/>
  <text x="168" y="307" class="arrow-label">binds</text>

  <!-- Target Cluster region -->
  <rect x="275" y="412" width="420" height="84" class="region"/>
  <text x="285" y="427" class="region-label">Target Cluster</text>

  <!-- Flux CD -->
  <rect x="290" y="438" width="155" height="42" class="box"/>
  <text x="367" y="463" text-anchor="middle" class="box-title">Flux CD</text>

  <!-- Deployed App -->
  <rect x="530" y="438" width="155" height="42" class="box"/>
  <text x="607" y="463" text-anchor="middle" class="box-title">Deployed App</text>

  <!-- zot-deploy to Flux -->
  <path d="M 540,390 L 445,448" class="arrow"/>
  <text x="498" y="414" text-anchor="middle" class="arrow-label">pulls</text>

  <!-- Flux to App -->
  <path d="M 445,459 L 530,459" class="arrow"/>
  <text x="480" y="453" text-anchor="middle" class="arrow-label">deploys</text>

  <!-- Legend -->
  <rect x="80" y="514" width="18" height="12" rx="3" ry="3"
        fill="#fff" stroke="#666" stroke-width="1.2" stroke-dasharray="4 2.5"/>
  <text x="104" y="524" class="legend-text">user-created</text>
  <rect x="190" y="514" width="18" height="12" rx="3" ry="3"
        fill="#fff" stroke="#666" stroke-width="1.2"/>
  <text x="214" y="524" class="legend-text">managed by SolAr</text>
</svg>
